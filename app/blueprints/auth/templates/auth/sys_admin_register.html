{% extends "base.html" %}

{% block title %}System Admin Register{% endblock %}

{% block content %}
<div class="card">
    <h1>Create Account</h1>
    <p>System admins can create Graduate Secretary, Faculty Instructor, and Graduate Student accounts.</p>

    <form method="POST" action="{{ url_for('auth.sys_admin_register') }}">
        <div>
            <label for="fname">First Name</label>
            <input type="text" id="fname" name="fname" required>
        </div>

        <div>
            <label for="mname">Middle Name</label>
            <input type="text" id="mname" name="mname">
        </div>

        <div>
            <label for="lname">Last Name</label>
            <input type="text" id="lname" name="lname" required>
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label for="password">Temporary Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div>
            <label for="role">Role</label>
            <select id="role" name="role" required>
                <option value="">Select a role</option>
                <option value="1">Graduate Secretary</option>
                <option value="2">Faculty Instructor</option>
                <option value="3">Graduate Student</option>
            </select>
        </div>

        <button type="submit">Create Account</button>
    </form>
</div>
{% endblock %}
