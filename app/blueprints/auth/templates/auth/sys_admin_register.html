{% extends "base.html" %}
{% block title %}{{ _('Create User') }}{% endblock %}

{% block content %}
<div class="card">
    <h1>{{ _('Create User') }}</h1>
    <p>{{ _('Create a new Graduate Secretary, Faculty Instructor, or Student account.') }}</p>

    <form method="POST" action="{{ url_for('auth.sys_admin_register') }}">
        <label>{{ _('First Name') }}</label>
        <input type="text" name="fname" required>

        <label>{{ _('Middle Name (optional)') }}</label>
        <input type="text" name="mname">

        <label>{{ _('Last Name') }}</label>
        <input type="text" name="lname" required>

        <label>{{ _('Email') }}</label>
        <input type="email" name="email" required>

        <label>{{ _('Password') }}</label>
        <input type="password" name="password" required>

        <label>{{ _('Role') }}</label>
        <select name="role" required id="role-select">
            <option value="">{{ _('Select role') }}</option>
            <option value="0">{{ _('System Administrator') }}</option>
            <option value="1">{{ _('Graduate Secretary') }}</option>
            <option value="2">{{ _('Faculty Instructor') }}</option>
            <option value="3">{{ _('Student') }}</option>
        </select>

        <div id="student-fields" style="display: none;">
            <label>{{ _('Program Track') }}</label>
            <select name="track">
                <option value="">{{ _('Select track') }}</option>
                <option value="Masters">{{ _('Masters') }}</option>
                <option value="PhD">{{ _('PhD') }}</option>
            </select>

            <label>{{ _('Admit Year') }}</label>
            <input type="number" name="admit_year" min="2000" max="2100">
        </div>

        <label>{{ _('Address Line 1') }}</label>
        <input type="text" name="line_one" required>

        <label>{{ _('Address Line 2 (optional)') }}</label>
        <input type="text" name="line_two">

        <label>{{ _('City') }}</label>
        <input type="text" name="city" required>

        <label>{{ _('State') }}</label>
        <input type="text" name="state" required>

        <label>{{ _('ZIP Code') }}</label>
        <input type="text" name="zip" required>

        <label>{{ _('Country Code') }}</label>
        <input type="text" name="country_code" value="US" required>

        <button type="submit">{{ _('Create User') }}</button>
    </form>
</div>

<script>
    document.getElementById('role-select').addEventListener('change', function() {
        document.getElementById('student-fields').style.display =
            this.value === '3' ? 'block' : 'none';
    });
</script>
{% endblock %}
